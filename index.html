<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExploraU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
/* ── VARIABLES LIGHT ── */
:root,[data-theme="light"]{
  --cream:#F5EFE0;--parchment:#EDE0C4;--clay:#A0522D;--terracota:#C1440E;--gold:#C49A22;
  --dark:#1E1510;--ink:#3D2B1F;--muted:#7A6552;--white:#FDFAF4;--shadow:rgba(30,21,16,.15);
  --card-bg:#FDFAF4;--body-bg:#F5EFE0;--border-color:#EDE0C4;--input-bg:#FDFAF4;
  --radius-sm:8px;--radius-md:16px;--radius-lg:24px;
}
/* ── VARIABLES DARK ── */
[data-theme="dark"]{
  --cream:#1a1412;--parchment:#2a2118;--clay:#D4845A;--terracota:#E05A30;--gold:#E8B84B;
  --dark:#F5EFE0;--ink:#EDE0C4;--muted:#A89880;--white:#241e19;--shadow:rgba(0,0,0,.4);
  --card-bg:#241e19;--body-bg:#1a1412;--border-color:#3a2e24;--input-bg:#2a2118;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background-color:var(--body-bg);color:var(--ink);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 60% at 15% 10%,rgba(196,154,34,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 85% 90%,rgba(193,68,14,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* ── INICIO ── */
#inicio{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 40px;background-image:url('panorama.png');background-size:cover;background-position:center;background-repeat:no-repeat}
#inicio::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,6,3,.52) 0%,rgba(20,12,6,.68) 50%,rgba(10,6,3,.78) 100%);z-index:0}
#inicio>*{position:relative;z-index:1}

/* ── TOPBAR: idioma + dark mode ── */
.inicio-topbar{position:absolute;top:18px;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.idioma-selector{display:flex;gap:6px;align-items:center}
.idioma-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(237,224,196,.3);background:rgba(10,6,3,.45);backdrop-filter:blur(6px);color:rgba(237,224,196,.75);font-family:'Lato',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.idioma-btn:hover{border-color:var(--gold);color:var(--gold)}
.idioma-btn.activo{border-color:var(--gold);color:var(--gold);background:rgba(196,154,34,.15)}
.idioma-btn .bandera{font-size:1rem}

/* Dark mode toggle */
.dark-toggle{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(237,224,196,.3);background:rgba(10,6,3,.45);backdrop-filter:blur(6px);color:rgba(237,224,196,.75);font-family:'Lato',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.dark-toggle:hover{border-color:var(--gold);color:var(--gold)}
.dark-toggle svg{width:16px;height:16px;fill:currentColor;transition:transform .4s}
[data-theme="dark"] .dark-toggle svg{transform:rotate(180deg)}

/* ── LOGO EXPLORAU ── */
.explorau-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:4px}
.explorau-nombre{font-family:'Playfair Display',serif;font-size:clamp(3rem,9vw,5.5rem);font-weight:700;color:#F5EFE0;letter-spacing:3px;text-shadow:0 2px 24px rgba(0,0,0,.6);line-height:1}
.explorau-tagline{font-size:clamp(.72rem,2vw,.88rem);font-weight:300;color:rgba(237,224,196,.55);letter-spacing:4px;text-transform:uppercase;margin-top:8px}

.divider-gold{display:flex;align-items:center;gap:12px;margin:24px auto;width:260px}
.divider-gold::before,.divider-gold::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(196,154,34,.7),transparent)}
.divider-gold span{font-size:16px;color:var(--gold)}
.inicio-pregunta{font-size:clamp(.9rem,2.5vw,1.05rem);color:rgba(237,224,196,.78);text-align:center;margin-bottom:28px}

/* ── GRID DE BOTONES 3 COLUMNAS ── */
.botones-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:700px;width:100%}
.boton{padding:14px 18px;font-family:'Lato',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;border:none;border-radius:var(--radius-sm);cursor:pointer;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s;display:flex;align-items:center;justify-content:center;gap:8px;backdrop-filter:blur(4px)}
.boton::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .25s}
.boton:hover::after{opacity:1}
.boton:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(0,0,0,.4)}
.boton:active{transform:translateY(0)}
.boton svg{width:18px;height:18px;flex-shrink:0}
.boton-publica{background:rgba(30,21,16,.85);color:var(--gold);border:1px solid rgba(196,154,34,.3);box-shadow:0 6px 20px rgba(0,0,0,.35)}
.boton-privada{background:rgba(193,68,14,.85);color:#FDFAF4;border:1px solid rgba(255,255,255,.1);box-shadow:0 6px 20px rgba(193,68,14,.4)}
.boton-buscador{background:rgba(160,82,45,.85);color:#FDFAF4;border:1px solid rgba(255,255,255,.1);box-shadow:0 6px 20px rgba(160,82,45,.4)}
.boton-mapa{background:rgba(196,154,34,.9);color:#1E1510;border:1px solid rgba(255,255,255,.1);box-shadow:0 6px 20px rgba(196,154,34,.4)}
.boton-inst-pub{background:rgba(14,90,80,.85);color:#FDFAF4;border:1px solid rgba(255,255,255,.1);box-shadow:0 6px 20px rgba(14,90,80,.4)}
.boton-inst-priv{background:rgba(60,40,120,.85);color:#FDFAF4;border:1px solid rgba(255,255,255,.1);box-shadow:0 6px 20px rgba(60,40,120,.4)}

.inicio-tag{margin-top:32px;font-size:.68rem;letter-spacing:2.5px;text-transform:uppercase;text-align:center;color:rgba(237,224,196,.35)}

/* ── DARK TOGGLE EN CONTENIDO ── */
.content-topbar{position:fixed;top:16px;right:20px;z-index:500}
.dark-toggle-content{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border-color);background:var(--card-bg);color:var(--muted);font-family:'Lato',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px var(--shadow)}
.dark-toggle-content:hover{border-color:var(--clay);color:var(--clay)}
.dark-toggle-content svg{width:15px;height:15px;fill:currentColor}

/* ── CONTENIDO ── */
#contenido{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 20px 60px;animation:fadeUp .5s ease both;display:none}
.volver{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:transparent;border:1.5px solid var(--clay);color:var(--clay);border-radius:var(--radius-sm);font-family:'Lato',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;margin-bottom:28px}
.volver:hover{background:var(--clay);color:var(--white)}
.seccion-titulo{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2.3rem);color:var(--dark);margin-bottom:6px}
.seccion-badge{display:inline-block;padding:3px 14px;border-radius:20px;font-size:.73rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.badge-publica{background:rgba(30,21,16,.08);color:var(--dark)}
.badge-privada{background:rgba(193,68,14,.1);color:var(--terracota)}
.badge-buscador{background:rgba(160,82,45,.1);color:var(--clay)}
.badge-mapa{background:rgba(196,154,34,.15);color:#7a5c00}
.badge-inst-pub{background:rgba(14,90,80,.1);color:#0a5a50}
.badge-inst-priv{background:rgba(60,40,120,.1);color:#3c2878}
[data-theme="dark"] .badge-inst-pub{color:#4dc4b8}
[data-theme="dark"] .badge-inst-priv{color:#9b80e8}

/* ── CARDS UNIVERSIDADES ── */
.card{background:var(--card-bg);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:28px;box-shadow:0 4px 24px var(--shadow);border-top:4px solid;transition:box-shadow .3s,transform .3s}
.card:hover{box-shadow:0 16px 48px rgba(30,21,16,.18);transform:translateY(-4px)}
[data-theme="dark"] .card:hover{box-shadow:0 16px 48px rgba(0,0,0,.5)}
.card-header{display:flex;align-items:center;gap:16px;padding:24px 24px 18px;border-bottom:1px solid var(--border-color);flex-wrap:wrap}
.logo{width:52px;height:52px;object-fit:contain;border-radius:var(--radius-sm);flex-shrink:0}
.logo-fallback{width:52px;height:52px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:white;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-nombre{font-family:'Playfair Display',serif;font-size:clamp(.95rem,2.5vw,1.2rem);font-weight:700;color:var(--dark);line-height:1.25}
.card-sigla{display:inline-block;margin-top:5px;padding:2px 11px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:white}
.card-tipo{font-size:.66rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:5px 12px;border:1px solid var(--border-color);border-radius:20px;flex-shrink:0}
.card-body{display:grid;grid-template-columns:1fr 280px}
.card-facultades{padding:20px 24px}
.facultad{margin-bottom:7px}
.facultad-header{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:background .2s;background:rgba(30,21,16,.03)}
[data-theme="dark"] .facultad-header{background:rgba(255,255,255,.04)}
.facultad-header:hover{background:rgba(30,21,16,.07)}
[data-theme="dark"] .facultad-header:hover{background:rgba(255,255,255,.08)}
.fac-icon{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fac-nombre{font-size:.86rem;font-weight:700;color:var(--ink);flex:1;line-height:1.3}
.fac-chevron{width:15px;height:15px;flex-shrink:0;color:var(--muted);transition:transform .25s}
.facultad.open .fac-chevron{transform:rotate(180deg)}
.carreras{display:none;padding:6px 14px 10px 32px;list-style:none;border-left:2px solid var(--border-color);margin:3px 0 3px 18px}
.carreras li{font-size:.8rem;color:var(--muted);padding:5px 0;border-bottom:1px dashed var(--border-color);display:flex;align-items:center;gap:8px}
.carreras li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0}
.carreras li:last-child{border-bottom:none}
.carrera-item{cursor:pointer;transition:color .2s}
.carrera-item:hover{color:var(--clay)!important}
.carrera-item .carrera-link-txt{text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.card-imagen-wrap{position:relative;overflow:hidden;min-height:240px}
.card-imagen-wrap::before{content:'';position:absolute;inset:0;background:linear-gradient(to right,var(--card-bg) 0%,transparent 30%);z-index:1;pointer-events:none}
.imagen{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease}
.card:hover .imagen{transform:scale(1.04)}
.card-stats{display:flex;gap:20px;padding:14px 24px;border-top:1px solid var(--border-color);background:rgba(30,21,16,.02)}
[data-theme="dark"] .card-stats{background:rgba(255,255,255,.02)}
.stat{text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--dark);line-height:1}
.stat-label{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* ── CARDS INSTITUTOS ── */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.inst-card{background:var(--card-bg);border-radius:var(--radius-md);padding:22px;border-left:4px solid;box-shadow:0 4px 20px var(--shadow);transition:transform .25s,box-shadow .25s}
.inst-card:hover{transform:translateY(-3px);box-shadow:0 12px 36px var(--shadow)}
.inst-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.inst-logo{width:52px;height:52px;object-fit:contain;border-radius:var(--radius-sm);flex-shrink:0;background:var(--parchment);padding:2px}
[data-theme="dark"] .inst-logo{background:rgba(255,255,255,.06)}
.inst-logo-fb{width:52px;height:52px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:white;flex-shrink:0}
.inst-info{flex:1;min-width:0}
.inst-nombre{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--dark);line-height:1.3}
.inst-sigla{display:inline-block;margin-top:5px;padding:2px 10px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:white}
.inst-carreras-lista{list-style:none}
.inst-carreras-lista li{font-size:.8rem;color:var(--muted);padding:5px 0;border-bottom:1px dashed var(--border-color);display:flex;align-items:center;gap:8px}
.inst-carreras-lista li::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.inst-carreras-lista li:last-child{border-bottom:none}
.inst-footer{margin-top:14px;padding-top:10px;border-top:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center}
.inst-tipo-badge{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:3px 10px;border:1px solid var(--border-color);border-radius:20px}
.inst-count{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--dark)}
.inst-count-label{font-size:.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* ── BUSCADOR ── */
.buscador-wrap{position:relative;margin-bottom:22px}
.buscador-input{width:100%;padding:16px 52px 16px 22px;font-family:'Lato',sans-serif;font-size:.95rem;color:var(--ink);background:var(--input-bg);border:2px solid var(--border-color);border-radius:var(--radius-md);outline:none;transition:border-color .2s,box-shadow .2s;box-shadow:0 4px 16px var(--shadow)}
.buscador-input:focus{border-color:var(--clay);box-shadow:0 4px 24px rgba(160,82,45,.15)}
.buscador-input::placeholder{color:var(--muted)}
.buscador-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);pointer-events:none}
.buscador-icon svg{width:20px;height:20px;fill:var(--clay)}
.busqueda-stats{font-size:.8rem;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.busqueda-num{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--clay);font-weight:700}
.resultados-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.resultado-card{background:var(--card-bg);border-radius:var(--radius-md);padding:18px;border-left:4px solid;box-shadow:0 4px 16px var(--shadow);display:flex;align-items:flex-start;gap:14px;transition:transform .2s,box-shadow .2s;animation:fadeUp .3s ease both}
.resultado-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--shadow)}
.resultado-card.clickeable{cursor:pointer}
.res-logo{width:42px;height:42px;object-fit:contain;border-radius:var(--radius-sm);flex-shrink:0}
.res-logo-fb{width:42px;height:42px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:white;flex-shrink:0}
.res-info{flex:1;min-width:0}
.res-carrera{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;color:var(--dark);line-height:1.3;margin-bottom:5px}
.res-uni{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-sigla{display:inline-block;margin-top:5px;padding:2px 9px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:white}
.res-fac{font-size:.7rem;color:var(--muted);margin-top:3px;font-style:italic;line-height:1.3}
.res-plan-badge{display:inline-flex;align-items:center;gap:4px;margin-top:7px;padding:2px 9px;border-radius:20px;background:rgba(196,154,34,.12);color:#7a5c00;font-size:.62rem;font-weight:700;letter-spacing:1px}
[data-theme="dark"] .res-plan-badge{color:#c9a445}
.busqueda-vacia,.busqueda-inicio{text-align:center;padding:56px 20px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:12px}
.busqueda-vacia svg,.busqueda-inicio svg{width:44px;height:44px;fill:var(--border-color)}
.busqueda-vacia p,.busqueda-inicio p{font-size:.95rem}
.busqueda-vacia small,.busqueda-inicio small{font-size:.78rem;opacity:.7}

/* ── MAPA ── */
.mapa-layout{display:grid;grid-template-columns:1fr 320px;border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 8px 40px var(--shadow);border:1px solid var(--border-color);min-height:500px}
#map{height:500px;width:100%;z-index:0}
.mapa-panel{background:var(--card-bg);border-left:1px solid var(--border-color);display:flex;flex-direction:column}
.mapa-panel-header{padding:20px 20px 14px;border-bottom:1px solid var(--border-color)}
.mapa-panel-header h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--dark)}
.mapa-panel-header p{font-size:.75rem;color:var(--muted);margin-top:3px}
.mapa-uni-lista{padding:10px;border-bottom:1px solid var(--border-color);display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:220px}
.mapa-uni-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .2s;border:1.5px solid transparent}
.mapa-uni-item:hover{background:rgba(30,21,16,.04)}
[data-theme="dark"] .mapa-uni-item:hover{background:rgba(255,255,255,.05)}
.mapa-uni-item.activo{background:var(--parchment);border-color:var(--border-color)}
[data-theme="dark"] .mapa-uni-item.activo{background:rgba(255,255,255,.07)}
.mapa-uni-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mapa-uni-nombre{font-size:.8rem;font-weight:700;color:var(--ink);flex:1}
.mapa-uni-tipo{font-size:.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.mapa-info{padding:18px 20px;flex:1;overflow-y:auto}
.mapa-info-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--muted);gap:10px}
.mapa-info-placeholder svg{width:36px;height:36px;fill:var(--border-color)}
.mapa-info-placeholder p{font-size:.82rem}
.mapa-info-uni{display:none}
.mapa-info-uni.visible{display:block;animation:fadeUp .3s ease both}
.mapa-info-nombre{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:4px;line-height:1.25}
.mapa-info-sigla{display:inline-block;padding:2px 11px;border-radius:20px;font-size:.66rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:white;margin-bottom:12px}
.mapa-info-fila{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border-color);font-size:.8rem}
.mapa-info-fila:last-child{border-bottom:none}
.mapa-info-label{color:var(--muted)}
.mapa-info-valor{font-weight:700;color:var(--ink);text-align:right}
.marker-custom{width:48px;height:48px;border-radius:50%;border:3px solid white;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.35);cursor:pointer}
.marker-custom img{width:100%;height:100%;object-fit:cover;display:block}

/* ── MODAL PLAN DE ESTUDIOS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,6,3,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--card-bg);border-radius:var(--radius-lg);width:100%;max-width:720px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:slideIn .3s ease}
.modal-header{padding:22px 26px 18px;border-bottom:1px solid var(--border-color);display:flex;align-items:flex-start;gap:14px;flex-shrink:0}
.modal-header-info{flex:1;min-width:0}
.modal-carrera-nombre{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--dark);line-height:1.25}
.modal-uni-nombre{font-size:.8rem;color:var(--muted);margin-top:4px}
.modal-badges{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.modal-badge{padding:2px 11px;border-radius:20px;font-size:.66rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:white}
.modal-badge-stat{padding:2px 11px;border-radius:20px;font-size:.66rem;font-weight:700;letter-spacing:1px;background:rgba(30,21,16,.07);color:var(--ink)}
[data-theme="dark"] .modal-badge-stat{background:rgba(255,255,255,.1)}
.modal-close{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border-color);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;transition:background .2s,color .2s}
.modal-close:hover{background:var(--clay);color:white;border-color:var(--clay)}
.modal-close svg{width:17px;height:17px;fill:currentColor}
.modal-tabs{display:flex;gap:3px;padding:14px 18px 0;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border-color)}
.modal-tab{padding:7px 14px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;border:1.5px solid transparent;border-bottom:none;font-family:'Lato',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:1px;cursor:pointer;white-space:nowrap;background:transparent;color:var(--muted);transition:all .2s;flex-shrink:0}
.modal-tab:hover{background:var(--parchment);color:var(--ink)}
.modal-tab.activo{background:var(--card-bg);border-color:var(--border-color);color:var(--dark);margin-bottom:-1px;padding-bottom:8px}
.modal-body{flex:1;overflow-y:auto;padding:22px 26px}
.modal-tab-content{display:none}
.modal-tab-content.visible{display:block;animation:fadeIn .2s ease}
.plan-tabla{width:100%;border-collapse:collapse}
.plan-tabla th{text-align:left;padding:9px 11px;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border-color);font-weight:700}
.plan-tabla td{padding:9px 11px;font-size:.83rem;border-bottom:1px dashed var(--border-color);color:var(--ink)}
.plan-tabla tr:last-child td{border-bottom:none}
.plan-tabla tr:hover td{background:rgba(196,154,34,.05)}
.plan-cod{font-family:monospace;font-size:.73rem;color:var(--clay);font-weight:700;white-space:nowrap}
.plan-num{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--muted);width:30px}
.plan-empty{text-align:center;padding:44px 20px;color:var(--muted);font-size:.88rem}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--parchment)}::-webkit-scrollbar-thumb{background:var(--clay);border-radius:3px}
.modal-body::-webkit-scrollbar{width:3px}.modal-tabs::-webkit-scrollbar{height:3px}

@media(max-width:1024px){.botones-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.mapa-layout{grid-template-columns:1fr}.mapa-panel{border-left:none;border-top:1px solid var(--border-color)}#map{height:300px}}
@media(max-width:768px){.card-body{grid-template-columns:1fr}.card-imagen-wrap{min-height:180px;order:-1}.card-imagen-wrap::before{background:linear-gradient(to bottom,var(--card-bg) 0%,transparent 40%)}.botones-grid{grid-template-columns:1fr;max-width:300px}.resultados-grid{grid-template-columns:1fr}.modal-box{max-height:95vh}.modal-header{padding:16px 18px}.modal-body{padding:16px 18px}.inst-grid{grid-template-columns:1fr}}
@media(max-width:480px){.modal-tabs{padding:10px 10px 0}.modal-tab{padding:5px 9px;font-size:.7rem}.inicio-topbar{padding:0 12px}.botones-grid{gap:10px}}
</style>
</head>

  const label = modoOscuro ? t('modoClaro') : t('modoOscuro');

}

/* Índice global de búsqueda (universidades + institutos) */
const indiceGlobal=[];
universidades.forEach(u=>u.facultades.forEach(f=>f.carreras.forEach(c=>indiceGlobal.push({carrera:c,facultad:f.nombre,inst:u.nombre,sigla:u.sigla,color:u.color,logo:u.logo,tipo:'universidad',planKey:c,planSigla:u.sigla}))));
[...institutosPrivados,...institutosPublicos].forEach(inst=>inst.carreras.forEach(c=>indiceGlobal.push({carrera:c,facultad:t('nivelTecnico'),inst:inst.nombre,sigla:inst.sigla,color:inst.color,logo:inst.logo,tipo:'instituto',planKey:null,planSigla:null})));

let contadorGlobal=0,mapInstance=null;

/* ══ HELPERS ══ */
function getPlan(carrera,sigla){if(sigla==='USFX')return PLANES_USFX[carrera]||null;if(PLANES_PRIVADAS[sigla])return PLANES_PRIVADAS[sigla][carrera]||null;return null}

function volver(){
  document.getElementById("contenido").innerHTML="";
  document.getElementById("contenido").style.display="none";
  document.getElementById("inicio").style.display="flex";
  document.getElementById("contentTopbar").style.display="none";
  mapInstance=null;
}

function initContenido(tituloHTML,badgeHTML){
  document.getElementById("inicio").style.display="none";
  document.getElementById("contentTopbar").style.display="block";
  const darkLabel=modoOscuro?t('modoClaro'):t('modoOscuro');
  ['darkLabelInicio','darkLabelContent'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=darkLabel});
  const cont=document.getElementById("contenido");
  cont.style.display="block";
  cont.innerHTML=`<button class="volver" onclick="volver()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>${t('volver')}</button>${tituloHTML}${badgeHTML}`;
  return cont;
}

/* ══ MODAL ══ */
function abrirModal(carrera,uniNombre,color,sigla){
  const plan=getPlan(carrera,sigla);
  document.getElementById("modalCarreraNombre").textContent=carrera;
  document.getElementById("modalUniNombre").textContent=uniNombre;
  const bd=document.getElementById("modalBadges");
  if(plan&&plan.length){const tot=plan.reduce((s,c)=>s+c.materias.length,0);bd.innerHTML=`<span class="modal-badge" style="background:${color}">${sigla}</span><span class="modal-badge-stat">${plan.length} ${t('semestre')}s</span><span class="modal-badge-stat">${tot} ${t('totalMaterias')}</span>`}
  else{bd.innerHTML=`<span class="modal-badge" style="background:${color}">${sigla}</span>`}
  const tabsDiv=document.getElementById("modalTabs"),bodyDiv=document.getElementById("modalBody");
  tabsDiv.innerHTML="";bodyDiv.innerHTML="";
  if(!plan||!plan.length){bodyDiv.innerHTML=`<div class="plan-empty">${t('sinPlan')}</div>`;document.getElementById("modalOverlay").classList.remove("hidden");document.body.style.overflow="hidden";return}
  plan.forEach((c,idx)=>{
    const tab=document.createElement("button");tab.className="modal-tab"+(idx===0?" activo":"");tab.textContent=`${t('semestre')} ${c.curso}`;
    tab.onclick=()=>{document.querySelectorAll(".modal-tab").forEach(b=>b.classList.remove("activo"));document.querySelectorAll(".modal-tab-content").forEach(d=>d.classList.remove("visible"));tab.classList.add("activo");document.getElementById("tc-"+idx).classList.add("visible")};
    tabsDiv.appendChild(tab);
    const div=document.createElement("div");div.className="modal-tab-content"+(idx===0?" visible":"");div.id="tc-"+idx;
    div.innerHTML=`<table class="plan-tabla"><thead><tr><th style="width:30px">#</th><th style="width:105px">Código</th><th>${t('materias')} (${c.materias.length})</th></tr></thead><tbody>${c.materias.map((m,i)=>`<tr><td class="plan-num">${i+1}</td><td class="plan-cod">${m.cod||'—'}</td><td>${m.nom}</td></tr>`).join('')}</tbody></table>`;
    bodyDiv.appendChild(div);
  });
  document.getElementById("modalOverlay").classList.remove("hidden");document.body.style.overflow="hidden";
}
function cerrarModal(e){if(e&&e.target!==document.getElementById("modalOverlay"))return;document.getElementById("modalOverlay").classList.add("hidden");document.body.style.overflow=""}
document.addEventListener("keydown",e=>{if(e.key==="Escape")cerrarModal()});

/* ══ MÓDULO: UNIVERSIDADES ══ */
function filtrar(tipo){
  const lista=universidades.filter(u=>u.tipo===tipo);
  const totalCar=lista.reduce((s,u)=>s+u.facultades.reduce((sf,f)=>sf+f.carreras.length,0),0);
  const titulo=tipo==='publica'?t('tituloPublica'):t('tituloPrivada');
  const cont=initContenido(`<h2 class="seccion-titulo">${titulo}</h2>`,`<span class="seccion-badge ${tipo==='publica'?'badge-publica':'badge-privada'}">${lista.length} ${t('instituciones')} · ${totalCar} ${t('carreras')}</span>`);
  lista.forEach((u,idx)=>{
    const numFac=u.facultades.length,numCar=u.facultades.reduce((s,f)=>s+f.carreras.length,0);
    const card=document.createElement("div");card.className="card";card.style.cssText=`border-top-color:${u.color};animation:fadeUp .5s ease ${idx*.1}s both`;
    let facHTML='';
    u.facultades.forEach(f=>{
      contadorGlobal++;const cid=contadorGlobal;
      const crHTML=f.carreras.map(c=>{const plan=getPlan(c,u.sigla);const tp=plan&&plan.length>0;return tp?`<li class="carrera-item" onclick="abrirModal('${c.replace(/'/g,"\\'")}','${u.nombre.replace(/'/g,"\\'")}','${u.color}','${u.sigla}')"><span class="carrera-link-txt">${c}</span><svg style="width:11px;height:11px;fill:var(--clay);flex-shrink:0;margin-left:auto" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg></li>`:`<li>${c}</li>`}).join('');
      facHTML+=`<div class="facultad" id="wrap${cid}"><div class="facultad-header" onclick="toggle(${cid})"><span class="fac-icon" style="background:${u.color}"></span><span class="fac-nombre">${f.nombre}</span><svg class="fac-chevron" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg></div><ul class="carreras" id="fac${cid}" style="border-left-color:${u.color}40">${crHTML}</ul></div>`;
    });
    card.innerHTML=`<div class="card-header"><img src="${u.logo}" class="logo" alt="${u.sigla}" onerror="this.outerHTML='<div class=\\'logo-fallback\\' style=\\'background:${u.color}\\'>${u.sigla.charAt(0)}</div>'"><div class="card-info"><div class="card-nombre">${u.nombre}</div><span class="card-sigla" style="background:${u.color}">${u.sigla}</span><span style="font-size:.62rem;margin-left:8px;color:var(--clay);font-weight:700">📋 ${t('planEstudios')}</span></div><span class="card-tipo">${tipo==='publica'?'🏛 '+t('publica'):'🏫 '+t('privada')}</span></div><div class="card-body"><div class="card-facultades">${facHTML}</div><div class="card-imagen-wrap"><img src="${u.imagen}" class="imagen" alt="${u.nombre}" onerror="this.style.display='none'"></div></div><div class="card-stats"><div class="stat"><div class="stat-num">${numFac}</div><div class="stat-label">${t('facultades')}</div></div><div class="stat"><div class="stat-num">${numCar}</div><div class="stat-label">${t('carreras')}</div></div></div>`;
    cont.appendChild(card);
  });
}
function toggle(id){const el=document.getElementById("fac"+id),wrap=document.getElementById("wrap"+id),open=el.style.display==="block";el.style.display=open?"none":"block";wrap.classList.toggle("open",!open)}

/* ══ MÓDULO: INSTITUTOS ══ */
function mostrarInstitutos(tipo){
  const lista=tipo==='publico'?institutosPublicos:institutosPrivados;
  const titulo=tipo==='publico'?t('tituloInstPub'):t('tituloInstPriv');
  const badge=tipo==='publico'?'badge-inst-pub':'badge-inst-priv';
  const colorAccent=tipo==='publico'?'#0a5a50':'#3c2878';
  const totalCar=lista.reduce((s,i)=>s+i.carreras.length,0);
  const cont=initContenido(`<h2 class="seccion-titulo">${titulo}</h2>`,`<span class="seccion-badge ${badge}">${lista.length} ${t('institutos')} · ${totalCar} ${t('carreras')}</span>`);
  const grid=document.createElement("div");grid.className="inst-grid";
  lista.forEach((inst,idx)=>{
    const card=document.createElement("div");card.className="inst-card";card.style.cssText=`border-left-color:${inst.color};animation:fadeUp .4s ease ${idx*.07}s both`;
    const liItems=inst.carreras.map(c=>`<li style="--dot-color:${inst.color}"><style>.inst-carreras-lista li::before{background:var(--dot-color,var(--gold))}</style>${c}</li>`).join('');
    card.innerHTML=`<div class="inst-header"><img src="${inst.logo}" class="inst-logo" alt="${inst.sigla}" onerror="this.outerHTML='<div class=\\'inst-logo-fb\\' style=\\'background:${inst.color}\\'>${inst.sigla.charAt(0)}</div>'"><div class="inst-info"><div class="inst-nombre">${inst.nombre}</div><span class="inst-sigla" style="background:${inst.color}">${inst.sigla}</span></div></div><ul class="inst-carreras-lista">${inst.carreras.map(c=>`<li style="border-bottom-color:var(--border-color)"><span style="width:5px;height:5px;border-radius:50%;background:${inst.color};flex-shrink:0;display:inline-block;margin-right:6px"></span>${c}</li>`).join('')}</ul><div class="inst-footer"><span class="inst-tipo-badge">${tipo==='publico'?'🏛 '+t('publico'):'🏫 '+t('privado')}</span><div style="text-align:right"><div class="inst-count">${inst.carreras.length}</div><div class="inst-count-label">${t('carreras')}</div></div></div>`;
    grid.appendChild(card);
  });
  cont.appendChild(grid);
}

/* ══ MÓDULO: BUSCADOR ══ */
function mostrarBuscador(){
  const tot=indiceGlobal.length;
  const cont=initContenido(`<h2 class="seccion-titulo">${t('tituloBuscador')}</h2>`,`<span class="seccion-badge badge-buscador">${tot} ${t('carreras')} · ${universidades.length+institutosPrivados.length+institutosPublicos.length} ${t('instituciones')}</span>`);
  const wrap=document.createElement("div");
  wrap.innerHTML=`<div class="buscador-wrap"><input class="buscador-input" type="text" id="inputBusqueda" placeholder="${t('placeholder')}" oninput="buscar(this.value)" autocomplete="off"><span class="buscador-icon"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span></div><div class="busqueda-stats" id="busquedaStats" style="display:none">${t('mostrando')} <span class="busqueda-num" id="busquedaNum">0</span> ${t('resultados')}</div><div id="resultadosGrid" class="resultados-grid"></div><div id="busquedaVacia" class="busqueda-vacia" style="display:none"><svg viewBox="0 0 24 24"><path d="M11 15h2v2h-2v-2zm0-8h2v6h-2V7zm1-5C6.47 2 2 6.5 2 12a10 10 0 0010 10 10 10 0 0010-10A10 10 0 0012 2zm0 18a8 8 0 01-8-8 8 8 0 018-8 8 8 0 018 8 8 8 0 01-8 8z"/></svg><p>${t('sinResultados')}</p><small>${t('intentaOtro')}</small></div><div id="busquedaInicio" class="busqueda-inicio"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><p>${t('buscarTexto')}</p><small>${t('buscarSub')}</small></div>`;
  cont.appendChild(wrap);
  setTimeout(()=>document.getElementById("inputBusqueda")?.focus(),100);
}
function buscar(query){
  const grid=document.getElementById("resultadosGrid"),vacia=document.getElementById("busquedaVacia"),inicio=document.getElementById("busquedaInicio"),sw=document.getElementById("busquedaStats"),sn=document.getElementById("busquedaNum");
  const q=query.trim().toLowerCase();grid.innerHTML="";
  if(!q){vacia.style.display="none";inicio.style.display="flex";sw.style.display="none";return}
  inicio.style.display="none";
  const res=indiceGlobal.filter(item=>item.carrera.toLowerCase().includes(q)||item.inst.toLowerCase().includes(q)||item.sigla.toLowerCase().includes(q));
  if(!res.length){vacia.style.display="flex";sw.style.display="none";return}
  vacia.style.display="none";sw.style.display="flex";sn.textContent=res.length;
  const regex=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  res.forEach((item,idx)=>{
    const plan=item.planKey?getPlan(item.planKey,item.planSigla):null;const tp=plan&&plan.length>0;
    const div=document.createElement("div");div.className="resultado-card"+(tp?" clickeable":"");div.style.cssText=`border-left-color:${item.color};animation-delay:${idx*.04}s`;
    if(tp)div.onclick=()=>abrirModal(item.carrera,item.inst,item.color,item.planSigla);
    const hl=item.carrera.replace(regex,'<mark style="background:rgba(196,154,34,.4);border-radius:3px;padding:0 2px">$1</mark>');
    const tipoLabel=item.tipo==='universidad'?'🎓 Universidad':'🏫 Instituto';
    div.innerHTML=`<img src="${item.logo}" class="res-logo" alt="${item.sigla}" onerror="this.outerHTML='<div class=\\'res-logo-fb\\' style=\\'background:${item.color}\\'>${item.sigla.charAt(0)}</div>'"><div class="res-info"><div class="res-carrera">${hl}</div><div class="res-uni">${item.inst}</div><span class="res-sigla" style="background:${item.color}">${item.sigla}</span><div class="res-fac" style="margin-top:3px">${tipoLabel}</div>${tp?`<div class="res-plan-badge">📋 ${t('verPlan')}</div>`:''}</div>`;
    grid.appendChild(div);
  });
}

/* ══ MÓDULO: MAPA ══ */
function mostrarMapa(){
  const cont=initContenido(`<h2 class="seccion-titulo">${t('tituloMapa')}</h2>`,`<span class="seccion-badge badge-mapa">Sucre, Bolivia · ${universidades.length} ${t('instituciones')}</span>`);
  const listaItems=universidades.map(u=>`<div class="mapa-uni-item" id="item-${u.sigla}" onclick="seleccionarUni('${u.sigla}')"><span class="mapa-uni-dot" style="background:${u.color}"></span><span class="mapa-uni-nombre">${u.sigla}</span><span class="mapa-uni-tipo">${u.tipo==='publica'?t('publica'):t('privada')}</span></div>`).join('');
  const wrapper=document.createElement("div");
  wrapper.innerHTML=`<div class="mapa-layout"><div id="map"></div><div class="mapa-panel"><div class="mapa-panel-header"><h3>${t('unisSucre')}</h3><p>${t('clickMarcador')}</p></div><div class="mapa-uni-lista">${listaItems}</div><div class="mapa-info"><div class="mapa-info-placeholder" id="mapaPlaceholder"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg><p>${t('seleccionaUni')}</p></div><div class="mapa-info-uni" id="mapaInfoUni"></div></div></div></div>`;
  cont.appendChild(wrapper);
  setTimeout(()=>{
    if(mapInstance)return;
    mapInstance=L.map('map').setView([-19.043,-65.259],14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInstance);
    universidades.forEach(u=>{
      const icono=L.divIcon({className:'',html:`<div class="marker-custom" style="border-color:${u.color}"><img src="${u.imagen}" onerror="this.parentElement.style.background='${u.color}';this.style.display='none'"></div>`,iconSize:[48,48],iconAnchor:[24,24],popupAnchor:[0,-26]});
      L.marker(u.coords,{icon:icono}).addTo(mapInstance).bindPopup(`<strong style="font-family:'Playfair Display',serif;color:${u.color}">${u.sigla}</strong><br><small>${u.nombre}</small>`,{maxWidth:200}).on("click",()=>seleccionarUni(u.sigla));
    });
    mapInstance.invalidateSize();
  },200);
}
function seleccionarUni(sigla){
  const u=universidades.find(u=>u.sigla===sigla);if(!u)return;
  document.querySelectorAll(".mapa-uni-item").forEach(el=>el.classList.remove("activo"));
  const item=document.getElementById("item-"+sigla);if(item){item.classList.add("activo");item.scrollIntoView({block:"nearest"})}
  if(mapInstance)mapInstance.setView(u.coords,16,{animate:true});
  document.getElementById("mapaPlaceholder").style.display="none";
  const infoDiv=document.getElementById("mapaInfoUni");infoDiv.className="mapa-info-uni visible";
  const numCar=u.facultades.reduce((s,f)=>s+f.carreras.length,0);
  infoDiv.innerHTML=`<div class="mapa-info-nombre">${u.nombre}</div><span class="mapa-info-sigla" style="background:${u.color}">${u.sigla}</span><div class="mapa-info-fila"><span class="mapa-info-label">${t('tipo')}</span><span class="mapa-info-valor">${u.tipo==='publica'?'🏛 '+t('publica'):'🏫 '+t('privada')}</span></div><div class="mapa-info-fila"><span class="mapa-info-label">${t('facultades')}</span><span class="mapa-info-valor">${u.facultades.length}</span></div><div class="mapa-info-fila"><span class="mapa-info-label">${t('carreras')}</span><span class="mapa-info-valor">${numCar}</span></div><div class="mapa-info-fila"><span class="mapa-info-label">${t('ranking')}</span><span class="mapa-info-valor">#${u.ranking}</span></div><div class="mapa-info-fila"><span class="mapa-info-label">${t('coords')}</span><span class="mapa-info-valor" style="font-size:.68rem">${u.coords[0].toFixed(4)}, ${u.coords[1].toFixed(4)}</span></div>`;
}
